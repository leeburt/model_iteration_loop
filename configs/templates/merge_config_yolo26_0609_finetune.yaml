# 精调模板：从已有 best.pt 低学习率再训练一个新实验。
project:
  name: external_inline_pose_merge_config_yolo26_0609_finetune
  output_root: runs
  python: /data1/libo/miniconda3/envs/yolo/bin/python

models:
  # 精调起点：改成你要继续优化的 best.pt。
  initial_weights: /data-ssd/libo/p100/atuo_iter/train_result/external_port/keypoint_yolo11x_pose_merge_config_yolo26_0609/weights/best.pt
  # 为空时验收自动使用 train.project/train.name/weights/best.pt。
  candidate_model: ""
  champion_model: ""

datasets:
  main_data: /data-ssd/libo/p100/yolo_utils/dataset/external_inline/merge_config_yolo26_0609.yaml

train:
  data: /data-ssd/libo/p100/yolo_utils/dataset/external_inline/merge_config_yolo26_0609.yaml
  # 精调从已有权重启动，但不复用旧 optimizer/scheduler。
  initial_weights: /data-ssd/libo/p100/atuo_iter/train_result/external_port/keypoint_yolo11x_pose_merge_config_yolo26_0609/weights/best.pt
  project: /data-ssd/libo/p100/atuo_iter/train_result/external_port
  name: keypoint_yolo11x_pose_merge_config_yolo26_0609_finetune_lr1e4
  resume: false
  args:
    task: pose
    mode: train
    # 精调不需要完整粗训轮数，靠 early stopping 选 best.pt。
    epochs: 80
    batch: 32
    imgsz: 1536
    patience: 20
    device: "5"
    workers: 16
    val: true
    optimizer: AdamW
    # 精调学习率：适合从已有 best.pt 稳定微调。
    lr0: 0.0001
    # 最终学习率约为 lr0 * lrf = 1e-6。
    lrf: 0.01
    momentum: 0.937
    weight_decay: 0.0005
    warmup_epochs: 1.0
    box: 6.5
    cls: 0.4
    dfl: 1.3
    pose: 16.0
    kobj: 1.8
    # 精调阶段降低扰动，避免破坏已学到的端口结构。
    degrees: 0.0
    hsv_h: 0.005
    hsv_s: 0.10
    hsv_v: 0.10
    translate: 0.02
    scale: 0.10
    fliplr: 0.5
    mosaic: 0.0
    erasing: 0.0
    close_mosaic: 0
    amp: true
    pretrained: true
    verbose: true
    plots: true
    save: true
    exist_ok: true
    cache: true

eval_protocol:
  metric: tiny_match_f1
  task: pose
  device: "0"
  imgsz: 1536
  batch: 1
  conf: 0.25
  nms_iou: 0.45
  half: true
  kp_px: 6.0
  kp_box_ratio: 0.60
  center_px: 8.0
  center_box_ratio: 0.75
  pad_px: 6.0
  min_padded_iou: 0.01
  baseline_iou: 0.50
  save_diff: true
  save_fp_diff_only: false
  save_duplicate_fp_diff: false

acceptance_profiles:
  full:
    run_id: merge_config_yolo26_0609_finetune_acceptance
    output_root: runs
    candidate_model: ""
    champion_model: ""
    eval_datasets:
      - name: merge_config_yolo26_0609
        data: /data-ssd/libo/p100/yolo_utils/dataset/external_inline/merge_config_yolo26_0609.yaml
        splits: [train, val]
